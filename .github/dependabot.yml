# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-reference
version: 2

updates:
  # ── npm (TypeScript/Node.js bot) ─────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 10
    # App (not a published library): bump the declared ranges in package.json.
    # package-lock.json is committed, so transitive security updates work too.
    versioning-strategy: increase
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
      include: scope
    labels:
      - dependencies
    groups:
      # Group non-major bumps into two PRs; majors stay solo for review.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Review framework majors manually as individual PRs.
      - dependency-name: discord.js
        update-types:
          - version-update:semver-major

  # ── Docker base images ───────────────────────────────────────────
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(docker)
    labels:
      - dependencies
      - docker
    groups:
      docker-all:
        patterns:
          - "*"

  # ── GitHub Actions workflows ─────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci(actions)
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"
